<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz | Class 10 Quiz Hub</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/quiz.css">
<script>
var savedTheme = localStorage.getItem('quizhub_theme') || 'dark';
document.write('<style>body{background:var(--background);color:var(--text)}</style>');
</script>
</head>
<body>
<nav class="navbar">
<div class="logo"><a href="../index.html">← Back</a></div>
<div id="subject-name" style="color:var(--primary);font-weight:bold;">Quiz</div>
</nav>
<div class="quiz-container">
<div id="setup-panel">
<h2 style="text-align:center">📝 Quiz Setup</h2>
<div class="form-group">
<label>Questions:</label>
<select id="q-count">
<option value="5">5 Questions</option>
<option value="10" selected>10 Questions</option>
<option value="15">15 Questions</option>
</select>
</div>
<button id="start-quiz-btn" class="btn-primary" style="width:100%">🚀 Start Quiz</button>
</div>
<div id="quiz-panel" style="display:none">
<div class="progress-container">
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
<div class="progress-text">
<span>Question <span id="question-progress">1</span> of <span id="total-questions">10</span></span>
<span>⏱️ <span id="timer">10:00</span></span>
</div>
</div>
<div class="question-card">
<div class="question-number">Question <span id="q-number">1</span></div>
<div class="question-text" id="question-text">Loading...</div>
<div class="options-grid" id="options-container"></div>
</div>
<div class="quiz-nav">
<button id="prev-btn" class="btn-secondary">← Previous</button>
<button id="next-btn" class="btn-primary">Next →</button>
</div>
</div>
</div>
<script>
if(savedTheme === 'light'){
    document.body.setAttribute('data-theme','light');
}
</script>
<script src="../js/data.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/quiz.js"></script>
</body>
</html>
